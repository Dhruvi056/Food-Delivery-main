version: '3.8'

services:
  backend:
    build: ./backend
    container_name: biteblitz-backend
    ports:
      - "4000:4000"
    environment:
      # Inject the containerized Redis url dynamically
      - REDIS_URL=redis://redis:6379
      # IMPORTANT: Sensitive keys (Stripe, SMTP, JWT) should NOT be committed in this file.
      # Feed them securely via a shell environment injected by the CI CI/CD or host.
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    networks:
      - biteblitz_net

  frontend:
    build: ./frontend
    container_name: biteblitz-frontend
    ports:
      - "5173:80"
    networks:
      - biteblitz_net
    depends_on:
      - backend

  admin:
    build: ./admin
    container_name: biteblitz-admin
    ports:
      - "5174:80"
    networks:
      - biteblitz_net
    depends_on:
      - backend

  redis:
    image: redis:alpine
    container_name: biteblitz-redis
    ports:
      - "6379:6379"
    networks:
      - biteblitz_net

networks:
  biteblitz_net:
    driver: bridge
